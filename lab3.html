<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Мої одногрупники</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        /* Стилі для таблиці згідно з вимогами */
        table {
            width: 100%; /* Ширина на всю сторінку */
            border-collapse: collapse;
            background-color: #1e1e1e; /* Темний фон, як на скріншоті */
            color: white;
            text-align: center;
        }
        th, td {
            border: 1px solid #ccc; /* Стиль границь */
            padding: 10px;
        }
        th {
            font-size: 1.2em;
        }
        /* Розмір фото: 4х3 см (прибл. 151x113 пікселів для екрану) */
        .student-photo {
            width: 151px;
            height: 113px;
            object-fit: cover;
            border-radius: 5px;
        }
        .student-link {
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        .student-link:hover {
            color: #4CAF50;
        }
        /* Стиль для iframe */
        iframe {
            width: 100%;
            height: 150px;
            border: none;
            background-color: #2a2a2a;
        }
        /* Стилі для медіа-блоку під таблицею */
        .media-section {
            margin-top: 30px;
            padding: 15px;
            background: white;
            border: 1px solid #ccc;
            color: black;
        }
        .download-link {
            display: block;
            margin-top: 10px;
            color: #0066cc;
        }
    </style>
</head>
